name: Deploy MkDocs + Staticrypt

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material mkdocs-git-revision-date-localized-plugin

      - name: Build MkDocs
        run: mkdocs build

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Encrypt with Staticrypt
        env:
          PASS: ${{ secrets.BLOG_PASSWORD }}
        run: |
          cp -r site encrypted
          find encrypted -name "*.html" | while read f; do
            npx staticrypt "$f" -p "$PASS" -d "$(dirname "$f")" \
              --short \
              --template-title "🔒 Private Notes" \
              --template-instructions "Enter password to continue" \
              --template-button "Unlock"
          done
          echo "=== Files ==="
          find encrypted -type f | sort

      - uses: actions/upload-pages-artifact@v3
        with:
          path: encrypted

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment

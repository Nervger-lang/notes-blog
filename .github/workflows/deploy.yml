name: Deploy MkDocs + Staticrypt

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install MkDocs
        run: pip install mkdocs mkdocs-material

      - name: Build MkDocs
        run: mkdocs build

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Encrypt with Staticrypt
        env:
          PASS: ${{ secrets.BLOG_PASSWORD }}
        run: |
          npx staticrypt site/index.html "$PASS" \
            -o encrypted/index.html \
            -t "🔒 私人笔记" \
            -i "输入密码查看" \
            --remember 30 \
            --label-password "密码"
          
          for f in site/**/*.html; do
            [ "$f" = "site/index.html" ] && continue
            rel="${f#site/}"
            dir="encrypted/$(dirname "$rel")"
            mkdir -p "$dir"
            npx staticrypt "$f" "$PASS" \
              -o "encrypted/$rel" \
              -t "🔒 私人笔记" \
              -i "输入密码查看" \
              --remember 30 \
              --label-password "密码"
          done
          
          # Copy all non-HTML assets
          find site -type f ! -name "*.html" | while read f; do
            rel="${f#site/}"
            mkdir -p "encrypted/$(dirname "$rel")"
            cp "$f" "encrypted/$rel"
          done
          
          echo "=== Encrypted files ==="
          find encrypted -type f | sort

      - uses: actions/upload-pages-artifact@v3
        with:
          path: encrypted

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
